  <body>
    <!-- Splash Screen with Animated Logo at Start -->
    <div id="splash" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0f1a;z-index:9999;transition:opacity .5s ease;">
      <img src="/assets/A_Logo.png" alt="Loading" style="width:140px;height:auto;image-rendering:-webkit-optimize-contrast;filter:drop-shadow(0 6px 24px rgba(0,0,0,.35));animation: splash-bounce 1.2s cubic-bezier(.68,-0.55,.27,1.55) infinite alternate;" />
    </div>

    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js" defer></script>
    <script>
      // Hide splash after app mounts or after a fallback timeout
      (function () {
        var hide = function () {
          var el = document.getElementById('splash');
          if (!el) return;
          el.style.opacity = '0';
          setTimeout(function(){ if (el && el.parentNode) el.parentNode.removeChild(el); }, 600);
        };
        // Fallback: hide after 4s (increased from 2.2s)
        var fallback = setTimeout(hide, 10000);
        // If the app dispatches a custom event when ready, hide earlier
        window.addEventListener('app:ready', function(){ clearTimeout(fallback); hide(); });
        // As an additional guard, hide on window load too
        window.addEventListener('load', function(){ setTimeout(hide, 1200); });
      })();
    </script>
    <style>
      @keyframes splash-bounce {
        0% { transform: scale(1) translateY(0); }
        60% { transform: scale(1.1) translateY(-18px); }
        100% { transform: scale(1) translateY(0); }
      }
    </style>
